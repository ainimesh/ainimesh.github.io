name: Deploy static site to GitHub Pages

# Deploys the plain HTML/CSS site (no Jekyll build) to GitHub Pages.
# One-time setup: Repo → Settings → Pages → Build and deployment →
#   Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Try to switch the Pages source to "GitHub Actions" automatically.
          # If this can't change it, set it manually:
          #   Settings → Pages → Build and deployment → Source = "GitHub Actions".
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
